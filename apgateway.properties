spring.application.name=Apgateway
server.port=9090
eureka.client.service-url.defaultZone=http://host.docker.internal:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


spring.cloud.gateway.server.webflux.routes[0].id=student-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://STUDENTSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/student/**

spring.cloud.gateway.server.webflux.routes[1].id=course-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://COURSESERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/course/**
